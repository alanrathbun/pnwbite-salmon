# WDFW Sport Fishing Pamphlet 2025-2026 — encoded sections.
#
# Source: 25WAFW_LR7.pdf (Washington State Sport Fishing Rules in effect
#         July 1, 2025 – June 30, 2026).
# Each section is a sub-area within a CRC zone; multiple sections may share a CRC
# but have different geographic descriptions and rules.
#
# Phase 1 coverage (encoded tonight): McNary Pool, McNary Tailrace, Hanford Reach
# (CRC 535, 536), Priest Rapids tailrace (CRC 537). Other sections to be added in
# follow-up sessions.
#
# Each section's status today is derived by matching today's date against the
# `salmon_hatchery_steelhead` rule list. The first matching date range wins.
# If no range matches, the section is treated as CLOSED to salmon (conservative
# default — pamphlet's implicit closure outside listed periods).
#
# Date ranges use `MM-DD..MM-DD` and may cross year boundaries (e.g., Dec 1..Jan 31).

# Top-level metadata used by the refresh detector and stale-pamphlet banner.
# Bump both fields (and any changed section rules) when WDFW publishes a new
# edition. The refresh detector compares pamphlet_filename against the live
# WDFW URL filename to decide whether to clear the stale-pamphlet banner.
pamphlet_filename: "25WAFW_LR7.pdf"
pamphlet_version: "2025-2026"

sections:

