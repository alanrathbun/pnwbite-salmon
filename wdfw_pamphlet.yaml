  # ===================================================================
  # Lower Columbia tributaries (alphabetical per WDFW pamphlet)
  # WA-jurisdiction tributaries entering the Columbia between the Pacific
  # Ocean (Buoy 10) and Bonneville Dam. Encoded from PDF pages 49-78
  # (printed) of 25WAFW_LR7.pdf, COLUMBIA BASIN RIVERS SPECIAL RULES
  # section. Major rivers covered: Cowlitz, Coweeman, Toutle (incl. NF
  # and SF), Kalama, Lewis (incl. East Fork), Salmon Creek (Clark Co.),
  # Washougal (incl. West Fork), Elochoman, Grays (incl. EF and WF),
  # Skamokawa Creek. Plus minor named tribs: Abernathy, Blue, Cedar
  # (Clark Co.), Chinook, Coal, Deep, Delameter, Germany, Green (Toutle
  # trib), Hamilton, Lacamas, Little Washougal, Mill (Cowlitz/Wahkiakum
  # and Lewis), Olequa, Outlet (Silver Lake), Salmon (Cowlitz/Lewis).
  #
  # Naseelle / Bear River are coastal (drain to Willapa Bay), not Columbia
  # tribs — encoded under PUGET SOUND AND COASTAL RIVERS in the pamphlet
  # and NOT covered here.
  #
  # Pattern notes:
  #   - Smaller tribs share a "fall-only" salmon window (Aug 1-Nov 30,
  #     Aug 1-Dec 31, or Nov 1-Dec 31) — coho/Chinook spawning runs.
  #   - Cowlitz / Kalama / Lewis: large hatchery-supported fisheries with
  #     Jan 1-Jul 31 + Aug 1-Dec 31 (effectively year-round) salmon retention.
  #   - Elochoman / Grays / Washougal mainstems: spring + fall windows.
  #   - "Sat. before Memorial Day" is approximated as 05-23 (latest possible
  #     Sat-before-MD in 2026; matcher is day-blind). "Fri. before Memorial
  #     Day" -> 05-22. This is per the same convention used in earlier blocks.
  #   - Year-round-closed tribs (Chinook River, Deep River, Elochoman above
  #     West Fork, Kalama above Falls hatchery to Summers, etc.) are encoded
  #     with `salmon_hatchery_steelhead: []` per A3 / lesson-#7 convention.
  # ===================================================================

