        status: open
        note: "Daily 6 up to 2 adult salmon incl <=1 chinook, anti-snagging"
      - dates: "09-01..09-17"
        status: open
        note: "Daily 6 up to 2 adult salmon, anti-snagging"
      - dates: "09-18..09-30"
        status: closed
      - dates: "10-01..10-15"
        status: open
        note: "Daily 6 up to 2 adults, anti-snagging in effect, only fish hooked inside mouth retained"
      - dates: "10-16..10-31"
        status: open
        note: "Daily 6 up to 2 adults"
