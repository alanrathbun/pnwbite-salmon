  # NOTE: The pamphlet specifies "Sat before Memorial Day" — a rolling annual
  # anchor that the v1 YAML schema cannot express directly. We've encoded the
  # 2026 instance as 05-23 (literal). This will drift up to ~6 days year over
  # year (Sat before MD 2027 is May 29). The pamphlet is republished annually,
  # so when refreshing the YAML for the next pamphlet edition, re-derive these
  # dates manually. Sections affected by this anchor: klickitat_mouth_to_fisher_hill,
  # klickitat_lyle_to_hatchery, white_salmon_upper. Future enhancement: add a
  # rolling-date helper (e.g. `dates: "memorial_day_saturday..07-31"`) and resolve
