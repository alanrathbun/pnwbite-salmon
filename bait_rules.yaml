# Each rule's `when` clause supports an optional MM-DD..MM-DD `dates` field
# that restricts the rule to a season. Rules with a `dates` clause are
# more specific than dateless rules and win when the calling date falls
# in the window. Date ranges may wrap year-end (e.g. "11-01..03-31").
# Dateless rules serve as fallbacks when no seasonal rule matches.

# ===== Spring Chinook (Mar 1 - Jun 15) =====
- when: { species: chinook, dates: "03-01..06-15", reach_type: reservoir-side, flow_band: "*", clarity_band: "*" }
  techniques:
    - rank: 1
      method: troll_herring
      label: "Troll plug-cut herring"
      gear:
        flasher: "8in chrome or chartreuse (10in if Wind River mouth muddy)"
        leader: "42-48in 25lb mono from flasher to bait"
        hook: "4/0-5/0 tandem hook rig, 2-finger spacing"
        bait: "green or blue label herring, plug cut"
      notes: "Drano Lake portion; troll 1.5-2 mph along the seam off the hatchery."
      sources:
        - "https://fishstotts.com/reports/drano-lake-springer-salmon-fishing-tips-techniques-columbia-river/ — Drano Lake trolling 1.5-2 mph, tuna/herring wraps"
        - "https://www.columbian.com/news/2014/apr/30/outdoors-spring-chinook-columbia-gorge-style/ — 8in flasher standard, 42-48in leader, 4/0-5/0 hooks confirmed"
        - "https://salmontroutsteelheader.com/blogs/articles/trolling-for-chinook-on-the-columbia-river-randall-bonner — 25lb leader, 3/0 octopus, green/chartreuse flasher"
    - rank: 2
      method: bobber_eggs
      label: "Bobber + cured eggs"
      gear:
        weight: "3/4-1 oz west-coast slip float"
        leader: "3-4ft 25lb fluoro"
        hook: "2/0 octopus"
        bait: "Pautzke Fire Cure red eggs, dime-quarter sized cluster"
      notes: "Anchor and drift along break lines."
      sources:
        - "https://pautzke.com/learn-to-rig-a-bobber-eggs-for-fall-salmon/ — 25lb leader, 2/0 hook, golf-ball cluster confirmed"
        - "https://wdfw.wa.gov/fishing/basics/salmon/freshwater — float fishing for slow/eddy water confirmed"

- when: { species: chinook, dates: "03-01..06-15", reach_type: freeflowing, flow_band: "*", clarity_band: "*" }
  techniques:
    - rank: 1
      method: bobber_eggs
      label: "Bobber + cured eggs"
      gear:
        weight: "1/2-3/4 oz west-coast slip float"
        leader: "3-4ft 25lb fluoro"
        hook: "2/0 octopus"
        bait: "Pautzke Fire Cure red, golf-ball sized for hens"
      notes: "Drift seams below riffles; Snake/Clearwater pattern."
      sources:
        - "https://pautzke.com/learn-to-rig-a-bobber-eggs-for-fall-salmon/ — 2/0 hook, 25lb leader confirmed"
        - "https://salmontroutsteelheader.com/blogs/articles/fishing-baits-under-a-float-for-fall-salmon-by-jason-brooks — 30lb Power Pro main, 25lb leader"
    - rank: 2
      method: back_troll_kwikfish
      label: "Back-troll Kwikfish K15"
      gear:
        plug: "Kwikfish K15"
        wrap: "sardine wrap mandatory"
        leader: "42-48in 30lb mono"
        colors_by_clarity:
          clear: [silver-pirate, blue-pirate]
          stained: [chartreuse-pirate, fluor-red]
      notes: "Hold above hole, drop plug 60-100ft back."
      sources:
        - "https://www.ifish.net/threads/one-theory-of-how-to-fish-kwikfish-in-the-columbia.641801/ — 3.5-4ft 30lb leader to K-15, sardine wrap confirmed"
        - "https://www.ifish.net/threads/kwik-fish-rigging-help-for-back-a-trolling-rivers.504033/ — 3-4ft dropper, 3.5-4ft leader 30lb, sardine fillet 1.75 × 0.625in"

- when: { species: chinook, dates: "03-01..06-15", reach_type: "*", flow_band: "*", clarity_band: "*" }
  techniques:
    - rank: 1
      method: spinners_inline
      label: "In-line spinner"
      gear:
        spinner: "R&B Lures #4-5 or Blue Fox Vibrax #4-5 or Mepps Aglia #4-5"
        colors_by_clarity:
          clear: [silver/red, brass/red]
          stained: [chartreuse/orange, fluor-pink]
      notes: "Cast across seams, slow-to-medium retrieve; let spinner tick the bottom in deeper slots. R&B in-line spinner tops out at size #5."
      sources:
        - "https://www.yakimabait.com/blog/2019-09-03-casting-weighted-spinners-for-river-coho-salmon/ — Yakima Bait technique tutorial: cast across-and-upstream, retrieve slow within 1-2ft of bottom, let current work the lure; transfers to chinook"
        - "https://salmontroutsteelheader.com/blogs/articles/spring-chinook-tips-by-jd-richey — spinners effective for spring chinook; green/chartreuse/gold preference"
        - "https://www.randblures.com/collections/r-b-torpedo-spinners — R&B Original Torpedo in-line spinners (product catalog)"
    - rank: 2
      method: drift_spin_n_glo
      label: "Drift Spin-N-Glo + shrimp"
      gear:
        lure: "Yakima Bait Spin-N-Glo size #4-6"
        rig: "3-way swivel or Slido slider, pencil lead or slinky"
        leader: "24-36in 15-20lb mono"
        hook: "1/0-2/0 octopus"
        bait: "sand shrimp optional; or cured eggs"
        colors_by_clarity:
          clear: [pearl-pink (PLR), pearl-pink-tiger (PPT)]
          stained: [flame-red (FL), cerise (CER), chartreuse-red-spots (CL)]
      notes: "Drift bottom of moving water; Spin-N-Glo must spin freely above hook. Spring chinook historically caught on Columbia on sizes #2-#6."
      sources:
        - "https://www.yakimabait.com/blog/the-spin-n-glo-a-must-have-for-trophy-winter-steelhead/ — Yakima Spin-N-Glo sizes, colors, 3-way swivel rig, 24-36in leader"
        - "https://salmontroutsteelheader.com/blogs/articles/finessing-the-spin-glo-by-larry-ellis — size #4 plunking setup, color guide by clarity, Columbia River chinook historical note"
        - "https://www.ifish.net/threads/spin-n-glos.522001/ — sand shrimp + Spin-N-Glo combination confirmed"

# ===== Summer Chinook (Jun 16 - Jul 31) =====
- when: { species: chinook, dates: "06-16..07-31", reach_type: tailrace, flow_band: "*", clarity_band: "*" }
  techniques:
    - rank: 1
      method: brads_super_bait
      label: "Brad's Super Bait + tuna"
      gear:
        plug: "Brad's Super Bait"
        wrap: "canned tuna in oil mandatory (fill to hinge, do not overfill)"
        flasher: "11in chartreuse/green or glow/UV"
        leader: "35-45in 25-30lb fluoro"
        hook: "tandem 3/0 Gamakatsu Big River, 2.5-3in apart"
        colors_by_clarity:
          clear: [mountain-doo, lemon-lime]
          stained: [glow-ghost-green-dot, rotten-banana]
      notes: "Tailrace seams; troll at ~2 mph; reload tuna every 15 min. Back-troll against current for deeper presentation."
      sources:
        - "https://salmontroutsteelheader.com/blogs/articles/beebe-kings-the-cure-for-the-summertime-blues-bill-herzog — Brad's Super Bait + tuna, 35-45in 25-30lb leader, 11in flasher, color names confirmed"
        - "https://jonessportfishing.com/summer-chinook-and-sockeye/ — Brad's Super Baits confirmed for Wanapum/Wells tailrace"
        - "https://salmonandsteelheadjournal.com/trolling-super-baits-flashers/ — tuna fill, 2 mph speed"

- when: { species: chinook, dates: "06-16..07-31", reach_type: "*", flow_band: "*", clarity_band: "*" }
  techniques:
    - rank: 1
      method: bobber_eggs
      label: "Bobber + cured eggs"
      gear:
        weight: "1/2-3/4 oz west-coast slip float"
        leader: "3-4ft 25lb fluoro"
        hook: "2/0 octopus"
        bait: "Pautzke Fire Cure red, golf-ball sized"
      notes: "Same as spring; transition continues."
      sources:
        - "https://pautzke.com/learn-to-rig-a-bobber-eggs-for-fall-salmon/ — same technique applies summer/fall"
        - "https://wdfw.wa.gov/fishing/basics/salmon/freshwater — bobber float techniques for salmon"

# ===== Sockeye =====
- when: { species: sockeye, reach_type: "*", flow_band: "*", clarity_band: "*" }
  techniques:
    - rank: 1
      method: dodger_smile_blade
      label: "Dodger + Smile Blade"
      gear:
        dodger: "8in chrome Double D Dodger or Sling Blade"
        leader: "8-18in 40lb mono"
        attractor: "Mack's Smile Blade 0.8-1in, pink/red"
        hook: "#4 Gamakatsu red treble or 2x-strong treble"
        scent: "coonstripe shrimp tip; Pro-Cure krill or shrimp gel"
      notes: "Troll 0.8-1.4 mph; kick throttle in/out for jigging action. Find fish on sonar 8-30ft. Plain coon shrimp on treble is alternate presentation."
      sources:
        - "https://jonessportfishing.com/how-to-fish-columbia-river-sockeye/ — 8in dodger, 8-24in 40lb leader, 0.8-inch Smile Blade, 0.8-1.4 mph confirmed"
        - "https://mackslure.com/blogs/mack-attack/five-tips-to-catch-more-sockeye-this-summer — Smile Blade Sockeye Pro, Double D Dodger, coon shrimp"

# ===== Fall Chinook (Aug 1 - Dec 31) =====
- when: { species: chinook, dates: "08-01..12-31", reach_type: freeflowing, flow_band: normal, clarity_band: clear }
  techniques:
    - rank: 1
      method: back_bounce_eggs
      label: "Back-bounce cured eggs"
      gear:
        weight: "2-4 oz cannonball on 12-18in dropper/slider"
        leader: "24-30in 30lb fluoro"
        hook: "5/0 octopus, single, fixed"
        bait: "Nickel-quarter cured roe, Pautzke Fire Cure red"
      notes: "Anchor at the head of the hole; tap bottom every 3-5s. Use slider rig so cannonball dropper is separate from leader."
      sources:
        - "https://www.ifish.net/threads/back-bouncing-salmon-bite.354884/ — 5/0 Gamakatsu Octopus, 30lb leader, cannonball on slider confirmed"
        - "https://pautzke.com/eastern-washingtons-hanford-reach-about-to-be-plugged-with-salmon/ — bouncing eggs along bottom, Fire Brine red eggs confirmed"
    - rank: 2
      method: troll_kwikfish_wrapped
      label: "Wrapped K15/K16 Kwikfish"
      gear:
        plug: "Kwikfish K15-K16"
        wrap: "sardine wrap mandatory"
        leader: "42-48in 40lb"
        colors_by_clarity:
          clear: [silver-pirate, blue-pirate, silver-chartreuse]
      notes: "Hold in current; drop plug 80-150ft back."
      sources:
        - "https://www.leeroysramblings.com/Hanford_reach.htm — silver/chartreuse all-time Hanford Reach K16 color"
        - "https://pautzke.com/eastern-washingtons-hanford-reach-about-to-be-plugged-with-salmon/ — K16 sardine wrap, back-troll confirmed"
        - "https://www.union-bulletin.com/explore/outdoor_recreation/fall-fishing-on-the-hanford-reach-of-the-columbia-river/article_5dc9cdde-a126-11ef-9864-ab91e2f96492.html — K16 behind Jet Diver as most productive Hanford lure"
    # NOTE: "Plug-cut herring on flasher" dropped from this rule — not confirmed as
    # a primary freeflowing/clear-water technique at Hanford Reach or Snake River.
    # Appropriate for lower Columbia tidal/reservoir water (see reservoir-side rules).

