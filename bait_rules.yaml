# ===== Coho =====
- when: { species: coho, reach_type: "*", flow_band: "*", clarity_band: "*" }
  techniques:
    - rank: 1
      method: twitching_jigs
      label: "Twitching jigs"
      gear:
        jig: "3/8-1/2 oz marabou"
        colors_by_clarity:
          clear: [pink/black, purple/black]
          stained: [chartreuse/black, hot-pink/black, cerise/black]
      notes: "Cast across slack water; sharp twitches on the fall. Lift rod 12-24in then drop tip with 1/4-turn reel. Try 'Turn & Burn' fast-retrieve in riffles."
      sources:
        - "https://salmontroutsteelheader.com/blogs/articles/beyond-twitch-coho — pink/purple/black/chartreuse confirmed; 1/2 oz in riffles"
        - "https://douglasoutdoors.com/blog/twitching-for-coho-salmon/ — 3/8-1/2 oz most popular confirmed"
        - "https://mackslure.com/blogs/mack-attack/twitching-rock-dancer-jigs-for-coho-salmon — twitching confirmed for Columbia coho"
    - rank: 2
      method: small_spinners
      label: "#4 in-line spinner"
      gear:
        size: "#4 Blue Fox Vibrax or R&B Lures in-line spinner"
        colors_by_clarity:
          clear: [chrome/red]
          stained: [chartreuse, hot-pink]
      notes: "Smaller profile than chinook; coho prefer faster retrieve. Cast into current, slow-medium retrieve."
      sources:
        - "https://www.yakimabait.com/blog/2019-09-03-casting-weighted-spinners-for-river-coho-salmon/ — Yakima Bait coho-specific spinner tutorial: faster retrieve than chinook, work the seams"
        - "https://bluefoxvibrax.com/ — Vibrax #4 (3/8 oz) brand reference for coho"
        - "https://www.randblures.com/collections/r-b-torpedo-spinners — R&B Original Torpedo product catalog"

# ===== Summer Steelhead (Apr 1 - Oct 31) =====
- when: { species: steelhead, dates: "04-01..10-31", reach_type: freeflowing, flow_band: "*", clarity_band: clear }
  techniques:
    - rank: 1
      method: side_drift_beads
      label: "Side-drift beads"
      gear:
        bead: "8-12mm soft bead"
        leader: "3-4ft 8lb fluoro"
        hook: "#2 bead hook, pegged"
        colors_by_clarity:
          clear: [mottled-natural, peach, dead-egg]
      notes: "Drift the seam at walking speed; bead 1-2in above hook. For Clearwater B-run, 10-12mm matches chinook egg size."
      sources:
        - "https://jonessportfishing.com/the-ultimate-guide-to-bead-fishing-for-clearwater-river-steelhead-colors-sizes-and-techniques/ — 6-14mm Clearwater beads, float fishing confirmed"
        - "https://north40.com/blog/drifting-beads-steelhead — 8mm bead for salmon egg match, peg 2-4in from hook"
    - rank: 2
      method: float_jig
      label: "Float-and-jig"
      gear:
        jig: "1/8 oz marabou"
        float: "fixed 3/4 oz"
        leader: "2-3ft 8lb"
        colors_by_clarity:
          clear: [pink/white, black/red]
      notes: "Set float depth 12-18in off bottom in tailouts."
      sources:
        - "https://www.yakimabait.com/know-how-reports/jig-fishing-for-steelhead-2/ — 1/8 oz summer jig, 2-3ft leader, pearlescent pink confirmed"

- when: { species: steelhead, dates: "04-01..10-31", reach_type: "*", flow_band: high, clarity_band: "*" }
  techniques:
    - rank: 1
      method: pull_plugs
      label: "Pull plugs"
      gear:
        plug: "Mag Lip 3.5 or Brad's Wiggler (3/8 oz)"
        leader: "30in 12lb mono (optional: 15ft Maxima bumper behind 30lb braid main)"
        colors_by_clarity:
          clear: [metallic-pink, fluor-chartreuse]
          stained: [metallic-pink, fluor-chartreuse, all-black]
      notes: "High flow / off-color; smaller plugs in soft water edges. Mag Lip 4.5 is salmon-size — use 3.5 for summer steelhead."
      sources:
        - "https://salmontroutsteelheader.com/blogs/articles/plugging-big-water-for-fall-summer-steelhead-the-snake-river-solution-bill-herzog — Mag Lip 3.5 (NOT 4.5) confirmed; 12lb Maxima leader; metallic pink dominant on Snake"
        - "https://seattlefishingco.com/products/brads-wiggler-plugs — Brad's Wiggler 3/8 oz confirmed for summer steelhead rivers"

- when: { species: steelhead, dates: "04-01..10-31", reach_type: "*", flow_band: "*", clarity_band: "*" }
  techniques:
    - rank: 1
      method: drift_yarn
      label: "Drift-fish yarn ball"
      gear:
        weight: "1/4-3/8 oz pencil lead"
        leader: "3-4ft 10lb fluoro"
        hook: "#1 octopus"
        bait: "yarn ball, peach/pink"
      notes: "Walk-the-bottom drift through holding water."
      sources:
        - "https://www.yakimabait.com/know-how-reports/drift-fishing-for-winter-steelhead-2/ — pencil lead, 18-30in leader, #1 hook confirmed"
        - "https://fishstotts.com/reports/how-to-drift-fishing-on-the-clearwater-river-drift-fishing-for-steelhead/ — 48-60in fluoro in clear water, pencil weights confirmed"

